  <header class="site-header">
    <div class="site-header__inner">
      <a class="site-title" href="index.html">Gio Rios</a>
      <nav class="site-nav" aria-label="Main navigation">

  <main class="page-wrap page-wrap--narrow contact-layout">
    <section class="prose prose--contact">
      <p><a href="mailto:bygiorios@gmail.com">bygiorios@gmail.com</a></p>
      <p><a href="https://instagram.com/bygiorios" target="_blank" rel="noreferrer">@bygiorios</a></p>
    </section>

    <form class="contact-form" action="mailto:bygiorios@gmail.com" method="post" enctype="text/plain">
      <label>
        Name
        <input type="text" name="name" required />
      </label>
      <label>
        Email
        <input type="email" name="email" required />
      </label>
      <label>
        Message
        <textarea name="message" rows="8" required></textarea>
      </label>
      <button type="submit">Send</button>
    </form>
  </main>

  <script src="js/script.js"></script>
